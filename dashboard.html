<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: #e5e7eb;
    padding: 40px;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 16px;
}
</style>
</head>
<body>

<div class="box">
    <h1>Admin Dashboard</h1>

    <button onclick="location.href='server.html'">Server-Konsole öffnen</button>
    <button onclick="logout()">Logout</button>
</div>

<script>
if (localStorage.getItem("role") !== "admin") {
    document.body.innerHTML = "<h1>Zugriff verweigert</h1>";
}

function logout() {
    localStorage.removeItem("role");
    window.location.href = "index.html";
}
</script>

</body>
</html>
